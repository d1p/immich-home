# Immich self-hosted – production-hardened compose
#
# Versioning: pin IMMICH_VERSION in .env (e.g. v2.6.3).
# To upgrade: update IMMICH_VERSION, then run:
#   docker compose pull && docker compose up -d
# Immich handles DB migrations automatically on startup.
#
# GPU: transcoding uses vaapi-wsl (AMD RX 7800 XT via DX12→VAAPI bridge on WSL2).
#       ML runs on CPU — ROCm does not work on Docker Desktop WSL2.
#       To switch to native-Linux ROCm later: change ML extends to hwaccel.ml.yml/rocm
#       and transcoding extends to hwaccel.transcoding.yml/vaapi.
#
# Access: exposed directly on port 2283 (LAN + Tailscale IP).
#         Run scripts/tailscale-serve.ps1 once for HTTPS via MagicDNS.
#
# Backup: backup-glacier syncs originals + DB dumps to S3 Glacier Deep Archive daily.

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      # Media storage — set UPLOAD_LOCATION in .env (CRITICAL: back this up)
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always
    healthcheck:
      disable: false
    networks:
      - immich-network
    # AMD GPUs do not expose /dev/dri in WSL2, so VAAPI is unavailable.
    # CPU transcoding on a modern Ryzen is fast enough for single-user.
    # To re-enable GPU later (native Linux or once AMD ships DRI on WSL2):
    #   extends:
    #     file: hwaccel.transcoding.yml
    #     service: vaapi-wsl
    deploy:
      resources:
        limits:
          memory: 1536M

  immich-machine-learning:
    container_name: immich_machine_learning
    # CPU-based ML — ROCm is not supported on Docker Desktop WSL2 for AMD GPUs.
    # On native Linux, change image to: ${IMMICH_VERSION:-release}-rocm
    # and change extends service to: rocm
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    extends:
      file: hwaccel.ml.yml
      service: cpu
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    environment:
      # --- Burst mode: full speed when working, free RAM when idle ---
      # Use all CPU cores during inference for maximum throughput.
      # After 60 s of inactivity, unload models to free ~1-2 GB.
      MACHINE_LEARNING_MODEL_TTL: '60'
      MACHINE_LEARNING_MODEL_TTL_POLL_S: '10'
      # Single worker to avoid duplicating models in memory.
      MACHINE_LEARNING_WORKERS: '1'
    restart: always
    healthcheck:
      disable: false
    networks:
      - immich-network
    depends_on:
      - immich-server
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:ff21bc0f8194dc9c105b769aeabf9585fea6a8ed649c0781caeac5cb3c247884
    # Immich uses Redis only as a job queue / cache — no persistence needed.
    command: >-
      valkey-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - immich-network
    deploy:
      resources:
        limits:
          memory: 256M

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0@sha256:fa4f6e0971f454cd95fec5a9aaed2ed93d8f46725cc6bc61e0698e97dba96da1
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment if your database is on a spinning HDD (not SSD):
      # DB_STORAGE_TYPE: 'HDD'
    # --- PostgreSQL tuning for single-user Immich ---
    # These -c flags override the image's built-in SSD config.
    # max_connections: Immich uses a connection pool of ~5; 100 wastes ~500 MB.
    # shared_buffers: 256 MB is plenty for <100k photos (image default is 512 MB).
    # work_mem: Higher per-query budget is fine when there is only 1 user.
    command: >-
      postgres
      -c shared_preload_libraries=vchord.so
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c work_mem=32MB
      -c maintenance_work_mem=128MB
      -c max_connections=30
      -c random_page_cost=1.1
      -c wal_buffers=8MB
    volumes:
      # DB data — set DB_DATA_LOCATION in .env (do NOT put on a network share)
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    healthcheck:
      test: >-
        pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE_NAME} || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - immich-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # Offsite backup — syncs originals + DB dumps to S3 Glacier Deep Archive.
  # Runs daily at 03:00 (1 hour after Immich's 2 AM DB auto-backup).
  # Configure AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_BUCKET_NAME in .env.
  # Manually trigger: docker compose run --rm backup-glacier
  # ---------------------------------------------------------------------------
  backup-glacier:
    container_name: immich_backup_glacier
    image: rclone/rclone:1.69
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/scripts/backup-entrypoint.sh"]
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION:-us-east-1}
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ${UPLOAD_LOCATION}:/immich-data:ro
      - ./config/rclone.conf:/config/rclone/rclone.conf:ro
      - ./scripts/backup-glacier.sh:/scripts/backup-glacier.sh:ro
      - ./scripts/backup-entrypoint.sh:/scripts/backup-entrypoint.sh:ro
      - ./logs:/logs
    depends_on:
      - database
    networks:
      - immich-network

volumes:
  model-cache:

networks:
  immich-network:
    driver: bridge
